name: Build and Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Deploy Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.6.4

      - name: Install and Build with Dioxus
        run: |
          cargo binstall --force -y dioxus-cli@0.7.9
          export PATH="$HOME/.cargo/bin:$PATH"
          dx build --release

      - name: Get Version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n1 | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version is v$VERSION"

      - name: Check if Tag Exists
        id: check_tag
        run: |
          TAG_NAME="v${{ steps.get_version.outputs.VERSION }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists on origin."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist on origin."
          fi

      - name: Manage Tag and Push
        if: steps.check_tag.outputs.exists != 'true'
        run: |
          TAG_NAME="v${{ steps.get_version.outputs.VERSION }}"
          echo "Creating tag $TAG_NAME"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Prepare Release Assets
        if: steps.check_tag.outputs.exists != 'true'
        run: |
          # Copy to a predictable name for the release uploader
          cp target/dx/agy-orchestrator/release/web/server ./agy-orchestrator
          cp -r target/dx/agy-orchestrator/release/web/public ./public
          tar -czf agy-orchestrator-linux.tar.gz agy-orchestrator public

      - name: GitHub Release
        if: steps.check_tag.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          files: |
            ./agy-orchestrator-linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
